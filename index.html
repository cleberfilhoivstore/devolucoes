<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Registro de Devolucao</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#F7F6F3; --card:#fff; --border:#E2E0D8; --text:#1A1A1A; --muted:#888580; --radius:12px; }
body { background:var(--bg); font-family:-apple-system,'Helvetica Neue',sans-serif; color:var(--text); padding-bottom:110px; }
header { background:var(--card); border-bottom:1px solid var(--border); padding:14px 16px; }
header h1 { font-size:17px; font-weight:600; }
header p { font-size:12px; color:var(--muted); margin-top:2px; }
.wrap { padding:16px; max-width:480px; margin:0 auto; }

.upload-zone { background:var(--card); border:2px dashed var(--border); border-radius:var(--radius); padding:32px 16px; text-align:center; cursor:pointer; margin-bottom:14px; -webkit-tap-highlight-color:transparent; }
.upload-zone:active { background:#F0EEE8; }
.upload-zone input { display:none; }
.upload-zone .ico { font-size:40px; display:block; margin-bottom:10px; }
.upload-zone h2 { font-size:16px; font-weight:600; margin-bottom:6px; }
.upload-zone p { font-size:13px; color:var(--muted); }

.item { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
.item-head { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--border); }
.item-thumb { width:44px; height:44px; object-fit:cover; border-radius:8px; flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-info b { font-size:13px; font-weight:500; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-info span { font-size:12px; color:var(--muted); }
.badge { font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; flex-shrink:0; }
.bl { background:#FAEEDA; color:#633806; }
.bk { background:#EAF3DE; color:#27500A; }
.be { background:#FCEBEB; color:#791F1F; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin { display:inline-block; width:14px; height:14px; border:2px solid #E2E0D8; border-top-color:#633806; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:4px; }

.fields { padding:10px 12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.f { display:flex; flex-direction:column; gap:3px; }
.f.full { grid-column:1/-1; }
.f label { font-size:10px; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.04em; }
.f input,.f select,.f textarea { border:1px solid var(--border); border-radius:8px; padding:7px 9px; font-size:14px; color:var(--text); background:#fff; font-family:inherit; width:100%; outline:none; -webkit-appearance:none; appearance:none; }
.f input:focus,.f select:focus,.f textarea:focus { border-color:#1A1A1A; }
.f textarea { resize:none; min-height:60px; }
.f.auto input { background:#F0F7EA; border-color:#97C459; color:#2a5a0a; }
.f.auto label::after { content:" - auto"; color:#639922; font-weight:400; letter-spacing:0; text-transform:none; }
.sec { grid-column:1/-1; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; padding-top:6px; }

.btn-more { width:100%; background:transparent; border:1px dashed var(--border); border-radius:var(--radius); padding:13px; font-size:14px; color:var(--muted); text-align:center; cursor:pointer; margin-bottom:14px; display:none; -webkit-tap-highlight-color:transparent; }
.btn-more input { display:none; }

.bar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:12px 16px; display:none; }
.btn-send { width:100%; background:#1A1A1A; color:#fff; border:none; border-radius:var(--radius); padding:16px; font-size:16px; font-weight:700; cursor:pointer; }
.btn-send:disabled { opacity:.35; }
.bar-info { font-size:12px; color:var(--muted); text-align:center; margin-top:6px; }

.success { display:none; text-align:center; padding:64px 20px; }
.success .ico { font-size:56px; margin-bottom:16px; }
.success h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
.success p { font-size:15px; color:var(--muted); margin-bottom:28px; line-height:1.5; }
.btn-novo { background:#1A1A1A; color:#fff; border:none; border-radius:var(--radius); padding:16px 32px; font-size:16px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<header>
  <h1>Registro de Devolucao</h1>
  <p>Fotografe a etiqueta para preencher automaticamente</p>
</header>

<div class="wrap" id="mainWrap">
  <div style="height:14px"></div>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fi1').click()">
    <input type="file" id="fi1" accept="image/*" onchange="handleFile(this)">
    <span class="ico">&#128247;</span>
    <h2>Fotografar etiqueta</h2>
    <p>Toque para abrir camera ou galeria</p>
  </div>

  <div id="queue"></div>

  <div class="btn-more" id="btnMore" onclick="document.getElementById('fi2').click()">
    <input type="file" id="fi2" accept="image/*" onchange="handleFile(this)">
    + Adicionar outra etiqueta
  </div>
</div>

<div class="success" id="successScreen">
  <div class="ico">&#10003;</div>
  <h2 id="sucTitle">Registrado!</h2>
  <p>Dados enviados para a planilha.</p>
  <button class="btn-novo" onclick="resetar()">Registrar nova devolucao</button>
</div>

<div class="bar" id="bar">
  <button class="btn-send" id="btnSend" disabled onclick="enviar()">Enviar para planilha</button>
  <div class="bar-info" id="barInfo"></div>
</div>

<script>
var URL_SCRIPT = "https://script.google.com/macros/s/AKfycby6or6cMy7oQOTTFMOzBAzSzoL4GS0ol5NizqUrwtMfljw2JU5ZRUDg6h0-tegvYL6v3A/exec";

var LOJAS = [
  { keys:["csf_store","csf store"], nome:"CSF Store", conta:"Meli 4" },
  { keys:["csouza_clothing","csouza clothing"], nome:"CSouza Clothing", conta:"Meli 2" },
  { keys:["iv store","ivstore","iv_store"], nome:"IV Store Oficial", conta:"Meli 2" },
  { keys:["ivianastore","iviana store","inaiara viana"], nome:"IViana Store", conta:"Meli 3" }
];

var items = [];

function hoje() {
  var d = new Date();
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yy = d.getFullYear();
  return dd+'/'+mm+'/'+yy;
}

function detectarLoja(txt) {
  var t = (txt||'').toLowerCase();
  for (var i=0; i<LOJAS.length; i++) {
    for (var j=0; j<LOJAS[i].keys.length; j++) {
      if (t.indexOf(LOJAS[i].keys[j]) >= 0) return LOJAS[i];
    }
  }
  return null;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function upd(id,k,v) { var i=items.find(function(x){return x.id==id;}); if(i&&i.data) i.data[k]=v; }

function handleFile(input) {
  if (!input.files || !input.files.length) return;
  var file = input.files[0];
  input.value = '';

  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('btnMore').style.display = 'block';
  document.getElementById('bar').style.display = 'block';

  var id = Date.now();
  var reader = new FileReader();
  reader.onload = function(e) {
    var src = e.target.result;
    var base64 = src.split(',')[1];
    var item = { id:id, file:file, base64:base64, mimeType:file.type||'image/jpeg', status:'loading', data:null };
    items.push(item);
    adicionarDOM(item, src);
    extrair(item);
    atualizarBar();
  };
  reader.readAsDataURL(file);
}

function adicionarDOM(item, src) {
  var div = document.createElement('div');
  div.className = 'item';
  div.id = 'item'+item.id;
  div.innerHTML =
    '<div class="item-head">' +
      '<img class="item-thumb" src="'+src+'">' +
      '<div class="item-info">' +
        '<b id="nome'+item.id+'">Lendo etiqueta...</b>' +
        '<span id="sub'+item.id+'">aguarde</span>' +
      '</div>' +
      '<span class="badge bl" id="badge'+item.id+'"><span class="spin"></span>Lendo</span>' +
    '</div>' +
    '<div class="fields" id="fields'+item.id+'" style="display:none"></div>';
  document.getElementById('queue').appendChild(div);
}

function extrair(item) {
  fetch(URL_SCRIPT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imagem: item.base64, mimeType: item.mimeType })
  })
  .then(function(res) { return res.json(); })
  .then(function(json) {
    if (json.erro || !json.dados) throw new Error(json.erro||'sem dados');
    var p = json.dados;
    var loja = detectarLoja(p.loja);
    item.status = 'done';
    item.data = {
      dataDevolucao: hoje(), dataVenda: '',
      nomeCliente: p.nomeCliente||'', packId: p.packId||'',
      rastreio: p.rastreio||'', dataEtiqueta: p.dataEtiqueta||'',
      loja: loja ? loja.nome : (p.loja||''),
      conta: loja ? loja.conta : '',
      marketplace: 'Mercado Livre',
      produto:'', tamanho:'', cor:'', valorVenda:'', motivo:'', oficina:'', observacoes:''
    };
    document.getElementById('badge'+item.id).className='badge bk';
    document.getElementById('badge'+item.id).textContent='OK';
    document.getElementById('nome'+item.id).textContent = p.nomeCliente||'Cliente identificado';
    document.getElementById('sub'+item.id).textContent = loja ? loja.nome+' - '+loja.conta : (p.loja||'');
    renderCampos(item);
    atualizarBar();
  })
  .catch(function() {
    item.status = 'error';
    item.data = {
      dataDevolucao:hoje(), dataVenda:'', nomeCliente:'', packId:'',
      rastreio:'', dataEtiqueta:'', loja:'', conta:'', marketplace:'Mercado Livre',
      produto:'', tamanho:'', cor:'', valorVenda:'', motivo:'', oficina:'', observacoes:''
    };
    document.getElementById('badge'+item.id).className='badge be';
    document.getElementById('badge'+item.id).textContent='! Manual';
    document.getElementById('nome'+item.id).textContent='Preencha manualmente';
    document.getElementById('sub'+item.id).textContent='Nao foi possivel ler';
    renderCampos(item);
    atualizarBar();
  });
}

function renderCampos(item) {
  var d = item.data;
  var a = function(v){ return v ? 'f auto' : 'f'; };
  var wrap = document.getElementById('fields'+item.id);
  wrap.style.display = 'grid';
  wrap.innerHTML =
    '<div class="sec">Da etiqueta</div>' +
    '<div class="'+a(d.nomeCliente)+' full"><label>Nome do cliente</label><input value="'+esc(d.nomeCliente)+'" onchange="upd('+item.id+',\'nomeCliente\',this.value)"></div>' +
    '<div class="'+a(d.packId)+'"><label>Pack ID</label><input value="'+esc(d.packId)+'" onchange="upd('+item.id+',\'packId\',this.value)"></div>' +
    '<div class="'+a(d.rastreio)+'"><label>Rastreio</label><input value="'+esc(d.rastreio)+'" onchange="upd('+item.id+',\'rastreio\',this.value)"></div>' +
    '<div class="'+a(d.loja)+'"><label>Loja</label><input value="'+esc(d.loja)+'" onchange="upd('+item.id+',\'loja\',this.value)"></div>' +
    '<div class="'+a(d.conta)+'"><label>Conta Meli</label><input value="'+esc(d.conta)+'" onchange="upd('+item.id+',\'conta\',this.value)"></div>' +
    '<div class="f auto"><label>Data devolucao</label><input value="'+esc(d.dataDevolucao)+'" onchange="upd('+item.id+',\'dataDevolucao\',this.value)"></div>' +
    '<div class="'+a(d.dataEtiqueta)+'"><label>Data etiqueta</label><input value="'+esc(d.dataEtiqueta)+'" placeholder="DD/MM/AAAA" onchange="upd('+item.id+',\'dataEtiqueta\',this.value)"></div>' +
    '<div class="sec">Preencher manualmente</div>' +
    '<div class="f full"><label>Produto</label><input placeholder="Ex: Camiseta Basica" onchange="upd('+item.id+',\'produto\',this.value)"></div>' +
    '<div class="f"><label>Tamanho</label><input placeholder="P/M/G/GG" onchange="upd('+item.id+',\'tamanho\',this.value)"></div>' +
    '<div class="f"><label>Cor</label><input placeholder="Ex: Preto" onchange="upd('+item.id+',\'cor\',this.value)"></div>' +
    '<div class="f"><label>Valor (R$)</label><input placeholder="0,00" onchange="upd('+item.id+',\'valorVenda\',this.value)"></div>' +
    '<div class="f"><label>Motivo</label>' +
      '<select onchange="upd('+item.id+',\'motivo\',this.value)">' +
        '<option value="">Selecionar...</option>' +
        '<option>Produto com defeito</option>' +
        '<option>Produto diferente do anunciado</option>' +
        '<option>Tamanho errado</option>' +
        '<option>Cor diferente</option>' +
        '<option>Produto danificado no transporte</option>' +
        '<option>Desistencia da compra</option>' +
        '<option>Produto nao chegou</option>' +
        '<option>Outro</option>' +
      '</select></div>' +
    '<div class="f full"><label>Oficina</label><input placeholder="Nome da oficina" onchange="upd('+item.id+',\'oficina\',this.value)"></div>' +
    '<div class="f full"><label>Observacoes</label><textarea placeholder="Detalhes adicionais..." onchange="upd('+item.id+',\'observacoes\',this.value)"></textarea></div>';
}

function atualizarBar() {
  var loading = items.filter(function(i){return i.status==='loading';}).length;
  var prontos = items.filter(function(i){return i.status!=='loading';}).length;
  var btn = document.getElementById('btnSend');
  btn.disabled = prontos===0 || loading>0;
  document.getElementById('barInfo').textContent = loading>0
    ? 'Processando ' + loading + ' etiqueta' + (loading>1?'s':'') + '...'
    : prontos + ' devolucao' + (prontos>1?'es':'') + ' pronta' + (prontos>1?'s':'') + ' para enviar';
}

function enviar() {
  var btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  var prontos = items.filter(function(i){return i.status!=='loading';});
  var ok = 0;
  var total = prontos.length;

  function enviarProximo(idx) {
    if (idx >= total) {
      document.getElementById('mainWrap').style.display='none';
      document.getElementById('bar').style.display='none';
      document.getElementById('successScreen').style.display='block';
      document.getElementById('sucTitle').textContent = ok + ' devolucao' + (ok>1?'es':'') + ' registrada' + (ok>1?'s':'') + '!';
      window.scrollTo(0,0);
      return;
    }
    fetch(URL_SCRIPT, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(prontos[idx].data)
    })
    .then(function(){ ok++; enviarProximo(idx+1); })
    .catch(function(){ enviarProximo(idx+1); });
  }

  enviarProximo(0);
}

function resetar() {
  items=[];
  document.getElementById('queue').innerHTML='';
  document.getElementById('uploadZone').style.display='block';
  document.getElementById('btnMore').style.display='none';
  document.getElementById('bar').style.display='none';
  document.getElementById('mainWrap').style.display='block';
  document.getElementById('successScreen').style.display='none';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
