<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Registro de Devolução</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F7F6F3; --card: #FFFFFF; --border: #E2E0D8; --text: #1A1A1A;
    --muted: #888580; --accent: #1A1A1A; --accent-text: #FFFFFF;
    --radius: 12px; --radius-sm: 8px;
  }
  body { background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 60px; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 600; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .container { padding: 14px; max-width: 480px; margin: 0 auto; }

  /* Upload */
  .upload-zone { background: var(--card); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 24px 20px; text-align: center; cursor: pointer; margin-bottom: 12px; }
  .upload-zone:active { background: #F0EEE8; }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-zone p { font-size: 13px; color: var(--muted); }

  /* Queue */
  .queue { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
  .queue-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .queue-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .queue-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-info h4 { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-info p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .queue-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; font-weight: 500; }
  .status-loading { background: #FAEEDA; color: #633806; }
  .status-done { background: #EAF3DE; color: #27500A; }
  .status-error { background: #FCEBEB; color: #791F1F; }
  .status-pending { background: #F1EFE8; color: #5F5E5A; }

  /* Fields dentro do queue item */
  .fields-grid { padding: 10px 14px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 7px 9px; font-size: 13px; color: var(--text);
    background: var(--bg); font-family: inherit; -webkit-appearance: none; outline: none; width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
  .field textarea { resize: none; min-height: 60px; line-height: 1.4; }
  .field-auto input { background: #F0F7EA; border-color: #97C459; color: #27500A; }
  .field-auto label::after { content: " ✓ auto"; color: #639922; font-weight: 400; text-transform: none; letter-spacing: 0; }

  /* Spinner */
  .spinner { width: 16px; height: 16px; border: 2px solid #E2E0D8; border-top-color: #633806; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Add more */
  .btn-add-more { width: 100%; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius); padding: 12px; font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 12px; }
  .btn-add-more:active { background: var(--bg); }

  /* Submit */
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 12px 16px; z-index: 10; }
  .btn-submit { width: 100%; background: var(--accent); color: var(--accent-text); border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: -0.2px; }
  .btn-submit:disabled { opacity: 0.35; cursor: default; }
  .btn-submit:active:not(:disabled) { opacity: 0.85; }
  .submit-count { font-size: 12px; color: var(--muted); text-align: center; margin-top: 6px; }

  /* Success */
  .success-screen { display: none; text-align: center; padding: 60px 20px; }
  .success-screen .icon { font-size: 52px; margin-bottom: 16px; }
  .success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-screen p { font-size: 15px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
  .btn-novo { background: var(--accent); color: var(--accent-text); border: none; border-radius: var(--radius); padding: 16px 32px; font-size: 16px; font-weight: 600; cursor: pointer; }

  .section-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 4px 0 6px 2px; }
</style>
</head>
<body>

<header>
  <h1>📦 Registro de Devolução</h1>
  <p>Selecione uma ou mais fotos de etiquetas</p>
</header>

<div class="container" id="mainForm">

  <div style="height:12px"></div>

  <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(event)">
    <div class="upload-icon">📷</div>
    <h2>Selecionar fotos das etiquetas</h2>
    <p>Toque para abrir câmera ou galeria · várias de uma vez</p>
  </div>

  <div class="queue" id="queue"></div>

  <button class="btn-add-more" id="btnAddMore" style="display:none" onclick="document.getElementById('fileInput').click()">
    + Adicionar mais etiquetas
  </button>

</div>

<div class="success-screen" id="successScreen">
  <div class="icon">✅</div>
  <h2 id="successTitle">Devoluções registradas!</h2>
  <p id="successMsg">Os dados foram enviados para a planilha com sucesso.</p>
  <button class="btn-novo" onclick="novoRegistro()">Registrar novas devoluções</button>
</div>

<div class="submit-bar" id="submitBar" style="display:none">
  <button class="btn-submit" id="btnSubmit" onclick="enviarTudo()" disabled>Enviar para planilha →</button>
  <div class="submit-count" id="submitCount"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6or6cMy7oQOTTFMOzBAzSzoL4GS0ol5NizqUrwtMfljw2JU5ZRUDg6h0-tegvYL6v3A/exec";

const LOJAS = {
  "csf_store": { nome: "CSF Store", conta: "Meli 4" },
  "cleber de souza filho": { nome: "CSF Store", conta: "Meli 4" },
  "csouza_clothing": { nome: "CSouza Clothing", conta: "Meli 2" },
  "iv store": { nome: "IV Store Oficial", conta: "Meli 2" },
  "ivstore": { nome: "IV Store Oficial", conta: "Meli 2" },
  "ivianastore": { nome: "IViana Store", conta: "Meli 3" },
  "inaiara viana": { nome: "IViana Store", conta: "Meli 3" },
};

let items = [];

function hoje() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function detectarLoja(texto) {
  const t = texto.toLowerCase();
  for (const [key, val] of Object.entries(LOJAS)) {
    if (t.includes(key)) return val;
  }
  return null;
}

function handleFiles(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('btnAddMore').style.display = 'block';
  document.getElementById('submitBar').style.display = 'block';

  files.forEach(file => {
    const id = Date.now() + Math.random();
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result.split(',')[1];
      const item = { id, file, base64, status: 'loading', data: null };
      items.push(item);
      renderItem(item, ev.target.result);
      extrairDados(item);
    };
    reader.readAsDataURL(file);
  });

  e.target.value = '';
  atualizarSubmit();
}

function renderItem(item, src) {
  const queue = document.getElementById('queue');
  const div = document.createElement('div');
  div.className = 'queue-item';
  div.id = 'item-' + item.id;
  div.innerHTML = `
    <div class="queue-header">
      <img class="queue-thumb" src="${src}" alt="">
      <div class="queue-info">
        <h4>${item.file.name}</h4>
        <p id="info-${item.id}">Lendo etiqueta...</p>
      </div>
      <span class="queue-status status-loading" id="status-${item.id}"><span class="spinner"></span>Lendo</span>
    </div>
    <div class="fields-grid" id="fields-${item.id}" style="display:none"></div>
  `;
  queue.appendChild(div);
}

async function extrairDados(item) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: item.file.type || "image/jpeg", data: item.base64 } },
            { type: "text", text: `Esta é uma etiqueta de envio do Mercado Livre. Leia todos os textos visíveis mesmo que a etiqueta esteja torta ou invertida, e extraia os dados. Responda SOMENTE com JSON válido, sem markdown, sem texto extra:
{"nomeCliente":"","numeroPedido":"","rastreio":"","data":"","loja":"","marketplace":"Mercado Livre"}

Instruções:
- nomeCliente: nome do destinatário (cliente que comprou), não o remetente/loja
- numeroPedido: Pack ID ou Ref ID ou número de pedido visível
- rastreio: número abaixo do código de barras (sequência numérica longa, ex: 47233655087)
- data: data visível na etiqueta no formato DD/MM/AAAA
- loja: nome da loja/remetente exatamente como aparece na etiqueta (ex: "Cleber de Souza Filho (CSF_STORE)" ou "IV STORE COMÉRCIO DE ROUPAS LTDA")
- Se algum campo não estiver visível, deixe como string vazia` }
          ]
        }]
      })
    });

    const data = await resp.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    const loja = detectarLoja(parsed.loja || "");

    item.status = 'done';
    item.data = {
      dataDevolucao: hoje(),
      dataVenda: "",
      nomeCliente: parsed.nomeCliente || "",
      numeroPedido: parsed.numeroPedido || "",
      rastreio: parsed.rastreio || "",
      dataEtiqueta: parsed.data || "",
      loja: loja ? loja.nome : (parsed.loja || ""),
      conta: loja ? loja.conta : "",
      marketplace: "Mercado Livre",
      produto: "",
      tamanho: "",
      cor: "",
      valorVenda: "",
      motivo: "",
      oficina: "",
      observacoes: ""
    };

    document.getElementById('status-' + item.id).className = 'queue-status status-done';
    document.getElementById('status-' + item.id).textContent = '✓ Lido';
    document.getElementById('info-' + item.id).textContent = parsed.nomeCliente || 'Cliente identificado';
    renderFields(item);

  } catch(err) {
    item.status = 'error';
    item.data = {
      dataDevolucao: hoje(), dataVenda: "", nomeCliente: "", numeroPedido: "",
      rastreio: "", dataEtiqueta: "", loja: "", conta: "", marketplace: "Mercado Livre",
      produto: "", tamanho: "", cor: "", valorVenda: "", motivo: "", oficina: "", observacoes: ""
    };
    document.getElementById('status-' + item.id).className = 'queue-status status-error';
    document.getElementById('status-' + item.id).textContent = '⚠ Manual';
    document.getElementById('info-' + item.id).textContent = 'Preencha os campos manualmente';
    renderFields(item);
  }

  atualizarSubmit();
}

function renderFields(item) {
  const d = item.data;
  const wrap = document.getElementById('fields-' + item.id);
  wrap.style.display = 'grid';

  const auto = (val) => val ? 'field-auto' : '';

  wrap.innerHTML = `
    <div class="section-label full" style="grid-column:1/-1; font-size:10px; color:#888; padding: 4px 0 2px; text-transform:uppercase; letter-spacing:.06em;">Da etiqueta</div>

    <div class="field full ${auto(d.nomeCliente)}">
      <label>Nome do cliente</label>
      <input type="text" value="${esc(d.nomeCliente)}" onchange="update('${item.id}','nomeCliente',this.value)">
    </div>
    <div class="field ${auto(d.numeroPedido)}">
      <label>Nº pedido</label>
      <input type="text" value="${esc(d.numeroPedido)}" onchange="update('${item.id}','numeroPedido',this.value)">
    </div>
    <div class="field ${auto(d.rastreio)}">
      <label>Rastreio</label>
      <input type="text" value="${esc(d.rastreio)}" onchange="update('${item.id}','rastreio',this.value)">
    </div>
    <div class="field ${auto(d.loja)}">
      <label>Loja</label>
      <input type="text" value="${esc(d.loja)}" onchange="update('${item.id}','loja',this.value)">
    </div>
    <div class="field ${auto(d.conta)}">
      <label>Conta Meli</label>
      <input type="text" value="${esc(d.conta)}" onchange="update('${item.id}','conta',this.value)">
    </div>
    <div class="field field-auto">
      <label>Data devolução</label>
      <input type="text" value="${esc(d.dataDevolucao)}" onchange="update('${item.id}','dataDevolucao',this.value)">
    </div>
    <div class="field ${auto(d.dataEtiqueta)}">
      <label>Data etiqueta</label>
      <input type="text" value="${esc(d.dataEtiqueta)}" placeholder="DD/MM/AAAA" onchange="update('${item.id}','dataEtiqueta',this.value)">
    </div>

    <div class="section-label" style="grid-column:1/-1; font-size:10px; color:#888; padding: 8px 0 2px; text-transform:uppercase; letter-spacing:.06em;">Preencher manualmente</div>

    <div class="field full">
      <label>Produto</label>
      <input type="text" placeholder="Ex: Camiseta Básica" onchange="update('${item.id}','produto',this.value)">
    </div>
    <div class="field">
      <label>Tamanho</label>
      <input type="text" placeholder="P / M / G" onchange="update('${item.id}','tamanho',this.value)">
    </div>
    <div class="field">
      <label>Cor</label>
      <input type="text" placeholder="Ex: Preto" onchange="update('${item.id}','cor',this.value)">
    </div>
    <div class="field">
      <label>Valor da venda (R$)</label>
      <input type="text" placeholder="0,00" onchange="update('${item.id}','valorVenda',this.value)">
    </div>
    <div class="field">
      <label>Motivo</label>
      <select onchange="update('${item.id}','motivo',this.value)">
        <option value="">Selecionar…</option>
        <option>Produto com defeito</option>
        <option>Produto diferente do anunciado</option>
        <option>Tamanho errado</option>
        <option>Cor diferente</option>
        <option>Produto danificado no transporte</option>
        <option>Desistência da compra</option>
        <option>Produto não chegou</option>
        <option>Outro</option>
      </select>
    </div>
    <div class="field full">
      <label>Oficina</label>
      <input type="text" placeholder="Nome da oficina" onchange="update('${item.id}','oficina',this.value)">
    </div>
    <div class="field full">
      <label>Observações</label>
      <textarea placeholder="Detalhes adicionais..." onchange="update('${item.id}','observacoes',this.value)"></textarea>
    </div>
  `;
}

function esc(str) { return (str||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function update(id, field, value) {
  const item = items.find(i => String(i.id) === String(id));
  if (item && item.data) item.data[field] = value;
}

function atualizarSubmit() {
  const prontos = items.filter(i => i.status === 'done' || i.status === 'error').length;
  const total = items.length;
  const loading = items.filter(i => i.status === 'loading').length;
  const btn = document.getElementById('btnSubmit');
  const count = document.getElementById('submitCount');
  btn.disabled = prontos === 0 || loading > 0;
  if (loading > 0) {
    count.textContent = `Processando ${loading} etiqueta${loading>1?'s'}...`;
  } else {
    count.textContent = `${prontos} devolução${prontos>1?'ões':''} pronta${prontos>1?'s':''} para enviar`;
  }
}

async function enviarTudo() {
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const prontos = items.filter(i => i.status === 'done' || i.status === 'error');
  let enviados = 0;

  for (const item of prontos) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item.data)
      });
      enviados++;
    } catch(e) {}
  }

  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('submitBar').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
  document.getElementById('successTitle').textContent = `${enviados} devolução${enviados>1?'ões':''} registrada${enviados>1?'s':''}!`;
  document.getElementById('successMsg').textContent = `Os dados foram enviados para a planilha com sucesso.`;
  window.scrollTo(0,0);
}

function novoRegistro() {
  items = [];
  document.getElementById('queue').innerHTML = '';
  document.getElementById('dropzone').style.display = 'block';
  document.getElementById('btnAddMore').style.display = 'none';
  document.getElementById('submitBar').style.display = 'none';
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('successScreen').style.display = 'none';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
